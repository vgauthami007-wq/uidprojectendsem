<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Builder — Today</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/app.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="app-wrapper">

    <!-- Header -->
    <header class="app-header" id="appHeader">
      <div class="header-content">
        <div>
          <h2 class="header-title">Today</h2>
          <p class="header-sub" id="headerDate"></p>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="themeToggle" title="Toggle dark mode">🌙</button>
          <button class="icon-btn avatar-btn" onclick="goPage('settings.html')">👤</button>
        </div>
      </div>

      <!-- Week scroll -->
      <div class="week-scroll" id="weekScroll"></div>
    </header>

    <!-- Main content -->
    <main class="main-content">

      <!-- Status card -->
      <div class="status-card" id="statusCard">
        <div class="status-row">
          <span class="status-icon">📅</span>
          <div class="status-text">
            <div class="status-title" id="statusTitle">Today Status</div>
            <div class="status-sub" id="statusSub">Loading...</div>
          </div>
          <div class="status-pct" id="statusPct">0%</div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="overallProgress"></div>
        </div>
      </div>

      <!-- Habit list -->
      <div class="section-header">
        <span class="section-title">My Habits</span>
        <span class="habit-count" id="habitCount">0</span>
      </div>

      <div id="habitList"></div>

      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-emoji">🌱</div>
        <p>No habits yet. Tap <strong>+</strong> to add one!</p>
      </div>

      <!-- AI Coach card -->
      <div class="ai-card">
        <div class="ai-header">
          <div class="ai-title">🤖 AI Coach</div>
          <button class="btn-ai" id="aiBtn" onclick="getAITip()">Get Tips</button>
        </div>
        <div class="ai-body" id="aiBody">
          <p class="ai-placeholder">Get personalized coaching based on your habits!</p>
        </div>
      </div>

    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button class="nav-btn active" onclick="goPage('today.html')">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-btn" onclick="goPage('habits.html')">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Habits</span>
      </button>
      <button class="fab" onclick="openAddModal()">+</button>
      <button class="nav-btn" onclick="goPage('stats.html')">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Stats</span>
      </button>
      <button class="nav-btn" onclick="goPage('settings.html')">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </button>
    </nav>

  </div>

  <!-- Add Habit Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Add New Habit</h3>
        <button class="close-btn" onclick="closeAddModal()">✕</button>
      </div>
      <input type="text" class="modal-input" id="newHabitName" placeholder="Habit name (e.g. Read 20 mins)" maxlength="30" />
      <div class="modal-label">Choose Emoji</div>
      <div class="emoji-grid" id="emojiGrid"></div>
      <div class="modal-label">Choose Color</div>
      <div class="color-grid" id="colorGrid"></div>
      <button class="btn-add" onclick="addHabit()">Add Habit ✨</button>
    </div>
  </div>

  <!-- Edit Habit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Edit Habit</h3>
        <button class="close-btn" onclick="closeEditModal()">✕</button>
      </div>
      <input type="text" class="modal-input" id="editHabitName" placeholder="Habit name" maxlength="30" />
      <div class="modal-label">Choose Emoji</div>
      <div class="emoji-grid" id="editEmojiGrid"></div>
      <div class="modal-label">Choose Color</div>
      <div class="color-grid" id="editColorGrid"></div>
      <div class="modal-actions">
        <button class="btn-delete" onclick="deleteHabit()">🗑️ Delete</button>
        <button class="btn-save" onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Confetti canvas -->
  <canvas id="confettiCanvas" style="position:fixed;top:0;left:0;pointer-events:none;z-index:9999;width:100%;height:100%"></canvas>

  <script src="../js/storage.js"></script>
  <script src="../js/habits.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/ai.js"></script>
  <script src="../js/confetti.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
